<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MarkItDown — Document Converter</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;
  --bg2:#f7f7f5;
  --bg3:#f0f0ec;
  --text:#1a1a18;
  --text2:#5a5a56;
  --text3:#9a9a94;
  --border:rgba(0,0,0,0.12);
  --border2:rgba(0,0,0,0.22);
  --info:#185fa5;
  --info-bg:#e6f1fb;
  --success:#0f6e56;
  --success-bg:#e1f5ee;
  --danger:#a32d2d;
  --danger-bg:#fcebeb;
  --warn:#854f0b;
  --warn-bg:#faeeda;
  --radius:8px;
  --radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;
    --bg2:#252523;
    --bg3:#2e2e2b;
    --text:#f0f0ec;
    --text2:#a8a8a0;
    --text3:#686860;
    --border:rgba(255,255,255,0.1);
    --border2:rgba(255,255,255,0.2);
    --info:#85b7eb;
    --info-bg:#0c447c;
    --success:#5dcaa5;
    --success-bg:#085041;
    --danger:#f09595;
    --danger-bg:#791f1f;
    --warn:#ef9f27;
    --warn-bg:#633806;
  }
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;background:var(--bg3);color:var(--text)}
a{color:var(--info)}

/* Layout */
.shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 1.5rem;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.topbar .logo{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.01em}
.topbar .logo span{color:var(--text3);font-weight:400}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;background:var(--success-bg);color:var(--success)}
.badge.warn{background:var(--warn-bg);color:var(--warn)}

.content{flex:1;display:grid;grid-template-columns:340px 1fr;gap:0;max-height:calc(100vh - 52px);overflow:hidden}

/* Left panel */
.panel-left{background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-section{padding:1rem 1.25rem;border-bottom:0.5px solid var(--border)}
.panel-section:last-child{border-bottom:none;flex:1;overflow-y:auto}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}

/* Config fields */
.field{margin-bottom:10px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.field input,.field select{width:100%;padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;outline:none;transition:border-color 0.15s;height:34px}
.field input:focus,.field select:focus{border-color:var(--info)}
.field input[type=password]{font-family:monospace;letter-spacing:0.05em}
.key-row{display:flex;gap:6px}
.key-row input{flex:1}
.toggle-key{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:0 8px;cursor:pointer;color:var(--text2);font-size:14px;height:34px}
.toggle-key:hover{background:var(--bg2)}

/* Drop zone */
.drop{border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:border-color 0.15s,background 0.15s;position:relative;background:var(--bg2)}
.drop:hover,.drop.over{border-color:var(--info);background:var(--info-bg)}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:26px;color:var(--text3);margin-bottom:6px;display:block}
.drop p{font-size:13px;color:var(--text2);font-weight:500}
.drop span{font-size:11px;color:var(--text3);margin-top:4px;display:block;line-height:1.5}

/* Queue */
.queue-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.queue-list{display:flex;flex-direction:column;gap:6px}
.file-row{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:8px 10px;display:flex;align-items:flex-start;gap:8px;transition:border-color 0.15s}
.file-row.active{border-color:var(--info);background:var(--info-bg)}
.file-row.done{border-color:var(--border)}
.file-row.error{border-color:var(--danger);background:var(--danger-bg)}
.file-icon{font-size:17px;color:var(--text3);flex-shrink:0;margin-top:1px}
.file-info{flex:1;min-width:0}
.file-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:11px;color:var(--text3);margin-top:1px}
.file-err{font-size:11px;color:var(--danger);margin-top:2px}
.file-status{font-size:11px;font-weight:600;flex-shrink:0;margin-top:2px}
.s-pending{color:var(--text3)}
.s-converting{color:var(--info)}
.s-done{color:var(--success)}
.s-error{color:var(--danger)}
.file-remove{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:1px;flex-shrink:0;margin-top:1px;line-height:1}
.file-remove:hover{color:var(--danger)}
.progress{height:2px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.progress-bar{height:100%;width:0%;background:var(--info);border-radius:2px;transition:width 0.4s}

/* Buttons */
.btn{font-size:13px;padding:7px 14px;border-radius:var(--radius);cursor:pointer;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:background 0.12s,opacity 0.12s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn.primary{background:var(--text);color:var(--bg);border-color:transparent}
.btn.primary:hover{opacity:0.85}
.btn.sm{font-size:12px;padding:5px 11px}
.btn-row{display:flex;gap:8px;padding:1rem 1.25rem;border-top:0.5px solid var(--border);background:var(--bg)}

/* Right panel — results */
.panel-right{display:flex;flex-direction:column;overflow:hidden;background:var(--bg3)}
.results-wrap{flex:1;overflow-y:auto;padding:1.25rem}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--text3)}
.empty-state i{font-size:36px}
.empty-state p{font-size:13px}

.result-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1rem}
.result-card:last-child{margin-bottom:0}
.result-header{padding:10px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--bg2)}
.result-fname{font-size:13px;font-weight:500;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-meta{font-size:11px;color:var(--text3);flex-shrink:0}
.result-body textarea{width:100%;min-height:220px;max-height:500px;resize:vertical;border:none;outline:none;padding:12px 14px;font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace;font-size:12px;line-height:1.65;background:var(--bg);color:var(--text);display:block}
.result-footer{padding:8px 14px;border-top:0.5px solid var(--border);display:flex;gap:8px;background:var(--bg2);flex-wrap:wrap}

/* Toast */
.toast{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:13px;padding:8px 20px;border-radius:20px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1}

/* Mobile */
@media(max-width:680px){
  .content{grid-template-columns:1fr;grid-template-rows:auto 1fr;max-height:none;overflow:auto}
  .panel-left{max-height:none;overflow:visible;border-right:none;border-bottom:0.5px solid var(--border)}
  .panel-right{max-height:none}
}
</style>
</head>
<body>
<div class="shell">

  <header class="topbar">
    <span class="logo">MarkItDown <span>/ Document Converter</span></span>
    <div class="topbar-right">
      <span class="badge" id="status-badge">Checking…</span>
    </div>
  </header>

  <div class="content">

    <!-- Left: config + upload queue -->
    <aside class="panel-left">

      <div class="panel-section">
        <div class="section-label">Connection</div>
        <div class="field">
          <label>Endpoint</label>
          <input type="text" id="endpoint" placeholder="/convert" />
        </div>
        <div class="field">
          <label>API key</label>
          <div class="key-row">
            <input type="password" id="apikey" placeholder="X-API-Key" />
            <button class="toggle-key" id="togglekey" onclick="toggleKey()" title="Show / hide key">
              <i class="ti ti-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>
        <div class="field">
          <label>OCR mode</label>
          <select id="ocrmode">
            <option value="auto">Auto — OCR only if needed</option>
            <option value="force">Force — OCR every page</option>
            <option value="off">Off — no OCR</option>
          </select>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-label">Upload</div>
        <div class="drop" id="drop">
          <input type="file" id="fileinput" multiple
            accept=".pdf,.docx,.doc,.pptx,.ppt,.xlsx,.xls,.csv,.html,.htm,.txt,.md,.json,.xml,.rtf,.epub,.png,.jpg,.jpeg,.gif,.bmp,.tiff,.tif" />
          <i class="ti ti-cloud-upload drop-icon"></i>
          <p>Drop files or click to browse</p>
          <span>PDF · DOCX · PPTX · XLSX · CSV · HTML · TXT<br>PNG · JPG · TIFF · 25 MB max</span>
        </div>
      </div>

      <div class="panel-section">
        <div class="queue-header">
          <div class="section-label" style="margin-bottom:0">Queue <span id="queue-count" style="font-weight:400;text-transform:none;letter-spacing:0"></span></div>
          <button class="btn sm" onclick="clearDone()" id="clear-done" style="display:none">Clear done</button>
        </div>
        <div class="queue-list" id="queue"></div>
        <div id="queue-empty" style="font-size:12px;color:var(--text3);text-align:center;padding:1rem 0">No files yet.</div>
      </div>

      <div class="btn-row">
        <button class="btn primary" id="convert-btn" onclick="convertAll()" disabled>
          <i class="ti ti-player-play"></i> Convert all
        </button>
        <button class="btn" onclick="clearAll()">
          <i class="ti ti-trash"></i> Clear
        </button>
      </div>

    </aside>

    <!-- Right: results -->
    <main class="panel-right">
      <div class="results-wrap" id="results-wrap">
        <div class="empty-state" id="empty-state">
          <i class="ti ti-markdown"></i>
          <p>Converted documents appear here.</p>
        </div>
        <div id="results"></div>
      </div>
    </main>

  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const files = [];
let converting = false;

/* ── Bootstrap: fill endpoint from page origin, prefill key if server sent one ── */
(function(){
  const ep = document.getElementById('endpoint');
  ep.value = window.location.origin + '/convert';
  const meta = document.querySelector('meta[name="api-key-hint"]');
  if(meta && meta.content){
    const ki = document.getElementById('apikey');
    ki.value = meta.content;
    ki.setAttribute('data-prefilled','1');
  }
  checkHealth();
})();

function checkHealth(){
  const badge = document.getElementById('status-badge');
  fetch(window.location.origin+'/health')
    .then(r=>r.json())
    .then(d=>{
      badge.textContent = d.status==='ok' ? 'Online' : 'Degraded';
      badge.className = 'badge'+(d.status==='ok'?'':' warn');
    })
    .catch(()=>{badge.textContent='Offline';badge.className='badge warn';});
}

/* ── Key toggle ── */
function toggleKey(){
  const ki=document.getElementById('apikey');
  const ic=document.getElementById('eye-icon');
  if(ki.type==='password'){ki.type='text';ic.className='ti ti-eye-off';}
  else{ki.type='password';ic.className='ti ti-eye';}
}

/* ── File helpers ── */
function fmt(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function ext(name){return name.includes('.')?'.'+name.split('.').pop().toLowerCase():'';}
function sanitize(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function extIcon(name){
  const e=name.split('.').pop().toLowerCase();
  const m={pdf:'ti-file-type-pdf',docx:'ti-file-type-docx',doc:'ti-file-type-doc',
    pptx:'ti-presentation',ppt:'ti-presentation',xlsx:'ti-file-spreadsheet',
    xls:'ti-file-spreadsheet',csv:'ti-table',png:'ti-photo',jpg:'ti-photo',
    jpeg:'ti-photo',tiff:'ti-photo',tif:'ti-photo',gif:'ti-photo',bmp:'ti-photo',
    txt:'ti-file-text',md:'ti-markdown',html:'ti-html',htm:'ti-html',
    json:'ti-braces',xml:'ti-code',rtf:'ti-file-text',epub:'ti-book'};
  return m[e]||'ti-file';
}

/* ── File management ── */
function addFiles(list){
  let added=0;
  for(const f of list){
    if(files.find(x=>x.file.name===f.name&&x.file.size===f.size))continue;
    files.push({file:f,status:'pending',markdown:'',error:''});added++;
  }
  if(added) renderQueue();
}
function removeFile(i){files.splice(i,1);renderQueue();}
function clearAll(){files.length=0;renderQueue();}
function clearDone(){
  for(let i=files.length-1;i>=0;i--){
    if(files[i].status==='done')files.splice(i,1);
  }
  renderQueue();
}

/* ── Queue rendering ── */
function renderQueue(){
  const q=document.getElementById('queue');
  const qe=document.getElementById('queue-empty');
  const qc=document.getElementById('queue-count');
  const cd=document.getElementById('clear-done');
  const cb=document.getElementById('convert-btn');
  if(!files.length){q.innerHTML='';qe.style.display='block';qc.textContent='';cd.style.display='none';cb.disabled=true;return;}
  qe.style.display='none';
  const hasDone=files.some(f=>f.status==='done');
  const hasPending=files.some(f=>f.status==='pending'||f.status==='error');
  cd.style.display=hasDone?'':'none';
  cb.disabled=!hasPending||converting;
  qc.textContent='('+files.length+')';
  q.innerHTML='';
  files.forEach((item,i)=>{
    const row=document.createElement('div');
    const sc={pending:'s-pending',converting:'s-converting',done:'s-done',error:'s-error'}[item.status];
    const sl={pending:'Pending',converting:'Converting…',done:'Done',error:'Failed'}[item.status];
    const rowClass='file-row'+(item.status==='converting'?' active':item.status==='error'?' error':item.status==='done'?' done':'');
    row.className=rowClass;
    row.innerHTML=`
      <i class="ti ${extIcon(item.file.name)} file-icon" aria-hidden="true"></i>
      <div class="file-info">
        <div class="file-name">${escapeHtml(item.file.name)}</div>
        <div class="file-meta">${fmt(item.file.size)}</div>
        ${item.error?`<div class="file-err">${escapeHtml(item.error)}</div>`:''}
        ${item.status==='converting'?`<div class="progress"><div class="progress-bar" id="bar${i}"></div></div>`:''}
      </div>
      <span class="file-status ${sc}">${sl}</span>
      ${item.status!=='converting'?`<button class="file-remove" onclick="removeFile(${i})" aria-label="Remove"><i class="ti ti-x"></i></button>`:''}
    `;
    q.appendChild(row);
  });
}

/* ── Conversion ── */
async function convertAll(){
  if(converting)return;
  const endpoint=document.getElementById('endpoint').value.trim();
  const apikey=document.getElementById('apikey').value.trim();
  const ocrmode=document.getElementById('ocrmode').value;
  if(!endpoint){toast('Enter an endpoint.');return;}
  if(!apikey){toast('Enter an API key.');return;}
  const pending=files.filter(f=>f.status==='pending'||f.status==='error');
  if(!pending.length){toast('No files waiting to convert.');return;}
  converting=true;
  document.getElementById('convert-btn').disabled=true;
  document.getElementById('empty-state').style.display='none';

  for(let i=0;i<files.length;i++){
    const item=files[i];
    if(item.status!=='pending'&&item.status!=='error')continue;
    item.status='converting';item.error='';
    renderQueue();
    animateBar(i);
    try{
      const fd=new FormData();
      fd.append('file',item.file,item.file.name);
      fd.append('ocr',ocrmode);
      const res=await fetch(endpoint,{method:'POST',headers:{'X-API-Key':apikey},body:fd});
      if(!res.ok){
        const msgs={
          401:'Invalid API key.',
          413:'File too large (25 MB max).',
          415:'Unsupported file type.',
          422:'Could not read file. Try OCR force mode for scanned PDFs.',
          429:'Rate limited — wait a minute and retry.',
          504:'Conversion timed out.'
        };
        item.status='error';
        item.error=msgs[res.status]||`Server error (${res.status}).`;
      } else {
        const data=await res.json();
        item.status='done';item.markdown=data.markdown;
        renderResult(item);
      }
    } catch(e){
      item.status='error';item.error='Network error. Check endpoint and key.';
    }
    renderQueue();
  }
  converting=false;
  document.getElementById('convert-btn').disabled=false;
  renderQueue();
}

function animateBar(i){
  const get=()=>document.getElementById('bar'+i);
  let w=20;
  const iv=setInterval(()=>{
    const b=get();if(!b){clearInterval(iv);return;}
    w=Math.min(w+Math.random()*10,88);
    b.style.width=w+'%';
  },350);
}

/* ── Results ── */
function renderResult(item){
  const results=document.getElementById('results');
  const id='ta_'+sanitize(item.file.name)+'_'+Date.now();
  const words=item.markdown.trim().split(/\s+/).filter(Boolean).length;
  const chars=item.markdown.length;
  const card=document.createElement('div');
  card.className='result-card';
  card.innerHTML=`
    <div class="result-header">
      <i class="ti ti-markdown" aria-hidden="true" style="font-size:15px;color:var(--text3);flex-shrink:0"></i>
      <span class="result-fname">${escapeHtml(item.file.name)}</span>
      <span class="result-meta">${words.toLocaleString()} words · ${chars.toLocaleString()} chars</span>
    </div>
    <div>
      <textarea id="${id}" spellcheck="false" aria-label="Markdown output for ${escapeHtml(item.file.name)}">${escapeHtml(item.markdown)}</textarea>
    </div>
    <div class="result-footer">
      <button class="btn sm" onclick="copyResult('${id}')">
        <i class="ti ti-copy"></i> Copy
      </button>
      <button class="btn sm" onclick="downloadResult('${id}','${escapeHtml(item.file.name.replace(/\.[^.]+$/,'.md'))}')">
        <i class="ti ti-download"></i> Save .md
      </button>
      <button class="btn sm" onclick="clearResult(this)">
        <i class="ti ti-x"></i> Dismiss
      </button>
    </div>
  `;
  results.prepend(card);
  card.scrollIntoView({behavior:'smooth',block:'start'});
}

function copyResult(id){
  const ta=document.getElementById(id);
  if(!ta)return;
  navigator.clipboard.writeText(ta.value)
    .then(()=>toast('Copied to clipboard.'))
    .catch(()=>{ta.select();document.execCommand('copy');toast('Copied.');});
}

function downloadResult(id,filename){
  const ta=document.getElementById(id);
  if(!ta)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([ta.value],{type:'text/markdown;charset=utf-8'}));
  a.download=filename;a.click();
  URL.revokeObjectURL(a.href);
  toast('Saved '+filename+'.');
}

function clearResult(btn){
  btn.closest('.result-card').remove();
  if(!document.getElementById('results').children.length){
    document.getElementById('empty-state').style.display='flex';
  }
}

/* ── Toast ── */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2600);
}

/* ── Drop zone ── */
const drop=document.getElementById('drop');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over');});
drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');addFiles([...e.dataTransfer.files]);});
document.getElementById('fileinput').addEventListener('change',e=>{addFiles([...e.target.files]);e.target.value='';});
</script>
</body>
</html>
